<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Fábio Ferreira</title>
    <!--
      Fallback de SPA para GitHub Pages.
      O Pages nao conhece as rotas do React Router (ex.: /pro-portifolio/blog/artigo),
      entao ele cai aqui (404). Este script reescreve a URL para a raiz com a rota
      codificada em query string, e o index.html restaura a rota original.
      pathSegmentsToKeep = 1 porque o site fica em /pro-portifolio/.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
